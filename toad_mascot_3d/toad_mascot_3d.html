<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Toad Mascot - Cursor Follow</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(180deg, #bfefff 0%, #67c7e8 100%);
      font-family: Arial, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    .hint {
      position: fixed;
      left: 18px;
      bottom: 16px;
      color: rgba(0, 55, 30, 0.78);
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(6px);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="hint">Di chuột / kéo tay để mascot xoay đầu và đảo mắt.</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xbfefff, 8, 18);

    const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.25, 7.4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // Bật OrbitControls để dev kiểm tra model. Tắt rotate mặc định để vẫn giống MetaMask.
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enableRotate = false;
    controls.enablePan = false;
    controls.enableZoom = false;

    const ambient = new THREE.AmbientLight(0xffffff, 1.8);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 2.7);
    keyLight.position.set(4, 6, 6);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(1024, 1024);
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0x9be7ff, 1.2);
    rimLight.position.set(-4, 3, -5);
    scene.add(rimLight);

    const orange = new THREE.MeshStandardMaterial({ color: 0xffa51f, roughness: 0.58, metalness: 0.02 });
    const orangeDark = new THREE.MeshStandardMaterial({ color: 0xf88a12, roughness: 0.62 });
    const bellyMat = new THREE.MeshStandardMaterial({ color: 0xf6ef93, roughness: 0.65 });
    const white = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.38 });
    const black = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4 });
    const green = new THREE.MeshStandardMaterial({ color: 0x2fa145, roughness: 0.75 });
    const greenLight = new THREE.MeshStandardMaterial({ color: 0x77bf55, roughness: 0.75 });
    const waterMat = new THREE.MeshStandardMaterial({ color: 0x4bb8e9, roughness: 0.2, transparent: true, opacity: 0.52 });

    const mascot = new THREE.Group();
    scene.add(mascot);

    function sphere(name, material, position, scale, cast = true, receive = true) {
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 32), material);
      mesh.name = name;
      mesh.position.set(position[0], position[1], position[2]);
      mesh.scale.set(scale[0], scale[1], scale[2]);
      mesh.castShadow = cast;
      mesh.receiveShadow = receive;
      return mesh;
    }

    function capsule(name, material, position, scale, rotation = [0, 0, 0]) {
      const mesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.0, 10, 24), material);
      mesh.name = name;
      mesh.position.set(position[0], position[1], position[2]);
      mesh.scale.set(scale[0], scale[1], scale[2]);
      mesh.rotation.set(rotation[0], rotation[1], rotation[2]);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    // Lá sen nền.
    const pad = sphere('lily-pad-main', green, [0, -1.48, -0.05], [2.05, 0.13, 0.82], false, true);
    mascot.add(pad);

    const padHighlight = sphere('lily-pad-highlight', greenLight, [-0.25, -1.37, 0.28], [1.32, 0.035, 0.32], false, true);
    mascot.add(padHighlight);

    // Mặt nước phẳng phía dưới để model có chiều sâu khi đặt vào UI.
    const water = new THREE.Mesh(new THREE.CircleGeometry(3.7, 96), waterMat);
    water.rotation.x = -Math.PI / 2;
    water.position.set(0, -1.62, 0.15);
    water.receiveShadow = true;
    scene.add(water);

    // Thân chính.
    const body = sphere('orange-toad-body', orange, [0, -0.28, 0], [1.38, 1.22, 0.72]);
    mascot.add(body);

    const belly = sphere('yellow-belly', bellyMat, [0, -0.72, 0.67], [0.98, 0.56, 0.12]);
    mascot.add(belly);

    // Đốm hai bên má / thân.
    const spots = [
      [-0.98, -0.25, 0.69, 0.14], [-1.12, -0.55, 0.61, 0.105], [-0.88, -0.75, 0.70, 0.09],
      [0.98, -0.25, 0.69, 0.14], [1.12, -0.55, 0.61, 0.105], [0.88, -0.75, 0.70, 0.09]
    ];
    for (const [x, y, z, r] of spots) {
      mascot.add(sphere('soft-spot', bellyMat, [x, y, z], [r, r, 0.025], false, false));
    }

    // Mắt.
    const leftEyeGroup = new THREE.Group();
    leftEyeGroup.position.set(-0.48, 0.52, 0.62);
    const rightEyeGroup = new THREE.Group();
    rightEyeGroup.position.set(0.48, 0.52, 0.62);
    mascot.add(leftEyeGroup, rightEyeGroup);

    const leftEye = sphere('left-eye-white', white, [0, 0, 0], [0.36, 0.52, 0.13]);
    const rightEye = sphere('right-eye-white', white, [0, 0, 0], [0.36, 0.52, 0.13]);
    leftEyeGroup.add(leftEye);
    rightEyeGroup.add(rightEye);

    const leftPupil = sphere('left-pupil', black, [0.08, -0.08, 0.13], [0.095, 0.15, 0.028], false, false);
    const rightPupil = sphere('right-pupil', black, [-0.08, -0.08, 0.13], [0.095, 0.15, 0.028], false, false);
    leftEyeGroup.add(leftPupil);
    rightEyeGroup.add(rightPupil);

    // Mí mắt cam để tạo cảm giác mascot hơi lười/nhìn nửa mắt giống hình mẫu.
    const leftLid = sphere('left-orange-lid', orangeDark, [0.0, 0.24, 0.15], [0.39, 0.24, 0.05], true, false);
    const rightLid = sphere('right-orange-lid', orangeDark, [0.0, 0.24, 0.15], [0.39, 0.24, 0.05], true, false);
    leftEyeGroup.add(leftLid);
    rightEyeGroup.add(rightLid);

    // Lông mày bằng ống cong.
    function eyebrow(x, y, rotZ) {
      const curve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(-0.2, -0.02, 0),
        new THREE.Vector3(-0.05, 0.08, 0),
        new THREE.Vector3(0.22, 0.03, 0)
      ]);
      const geo = new THREE.TubeGeometry(curve, 18, 0.025, 8, false);
      const mesh = new THREE.Mesh(geo, black);
      mesh.position.set(x, y, 0.92);
      mesh.rotation.z = rotZ;
      mesh.castShadow = true;
      return mesh;
    }
    mascot.add(eyebrow(-0.48, 1.12, 0.1));
    mascot.add(eyebrow(0.48, 1.12, -0.1));

    // Miệng cười.
    const mouthCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(-0.55, -0.25, 0.77),
      new THREE.Vector3(-0.25, -0.55, 0.82),
      new THREE.Vector3(0.0, -0.60, 0.84),
      new THREE.Vector3(0.25, -0.55, 0.82),
      new THREE.Vector3(0.55, -0.25, 0.77)
    ]);
    const mouth = new THREE.Mesh(new THREE.TubeGeometry(mouthCurve, 36, 0.022, 8, false), black);
    mascot.add(mouth);

    // Tay chân.
    mascot.add(capsule('left-arm', orange, [-1.28, -0.75, 0.25], [0.25, 0.70, 0.23], [0, 0, -0.72]));
    mascot.add(capsule('right-arm', orange, [1.28, -0.75, 0.25], [0.25, 0.70, 0.23], [0, 0, 0.72]));
    mascot.add(capsule('left-leg', orange, [-0.85, -1.15, 0.55], [0.22, 0.55, 0.18], [0, 0, -1.18]));
    mascot.add(capsule('right-leg', orange, [0.85, -1.15, 0.55], [0.22, 0.55, 0.18], [0, 0, 1.18]));

    // Ngón tay/chân nhỏ.
    for (const side of [-1, 1]) {
      mascot.add(capsule('finger-a', orangeDark, [side * 1.42, -1.22, 0.62], [0.07, 0.28, 0.07], [0, 0, side * 1.35]));
      mascot.add(capsule('finger-b', orangeDark, [side * 1.25, -1.23, 0.62], [0.06, 0.25, 0.06], [0, 0, side * 0.9]));
    }

    mascot.position.y = 0.08;
    mascot.rotation.x = 0.02;

    // Nền đồi đơn giản bằng mesh để khi đưa vào landing page nhìn không bị trống.
    function hill(points, color, z, yOffset) {
      const shape = new THREE.Shape();
      shape.moveTo(points[0][0], points[0][1]);
      for (let i = 1; i < points.length; i++) shape.lineTo(points[i][0], points[i][1]);
      shape.lineTo(points[points.length - 1][0], -3);
      shape.lineTo(points[0][0], -3);
      shape.closePath();
      const mesh = new THREE.Mesh(new THREE.ShapeGeometry(shape), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.58 }));
      mesh.position.set(0, yOffset, z);
      return mesh;
    }
    scene.add(hill([[-6, -0.4], [-4, 0.2], [-2.2, -0.2], [0.5, 0.1], [2.8, -0.35], [6, 0.22]], 0x0f4938, -2.6, 0.4));
    scene.add(hill([[-6, -0.9], [-3.5, -0.2], [-0.5, -0.55], [2.5, -0.12], [6, -0.8]], 0x4aa800, -2.2, -0.05));

    const pointer = new THREE.Vector2(0, 0);
    const smoothPointer = new THREE.Vector2(0, 0);

    function updatePointer(clientX, clientY) {
      pointer.x = (clientX / window.innerWidth) * 2 - 1;
      pointer.y = (clientY / window.innerHeight) * 2 - 1;
    }

    window.addEventListener('pointermove', (e) => updatePointer(e.clientX, e.clientY));
    window.addEventListener('pointerleave', () => pointer.set(0, 0));

    const clock = new THREE.Clock();

    function animate() {
      const t = clock.getElapsedTime();
      smoothPointer.lerp(pointer, 0.075);

      // Hiệu ứng giống mascot MetaMask: toàn bộ đầu/thân xoay nhẹ theo con trỏ.
      mascot.rotation.y = smoothPointer.x * 0.38;
      mascot.rotation.x = -smoothPointer.y * 0.13 + Math.sin(t * 1.2) * 0.018;
      mascot.rotation.z = -smoothPointer.x * 0.035;
      mascot.position.y = 0.08 + Math.sin(t * 1.6) * 0.045;

      // Đồng tử đảo theo chuột, có giới hạn để không tràn khỏi mắt.
      leftPupil.position.x = 0.08 + smoothPointer.x * 0.07;
      leftPupil.position.y = -0.08 - smoothPointer.y * 0.055;
      rightPupil.position.x = -0.08 + smoothPointer.x * 0.07;
      rightPupil.position.y = -0.08 - smoothPointer.y * 0.055;

      // Blink tự nhiên mỗi vài giây.
      const blinkPhase = (t % 4.2);
      const blink = blinkPhase > 3.92 ? Math.sin((blinkPhase - 3.92) / 0.28 * Math.PI) : 0;
      leftEye.scale.y = 1 - blink * 0.78;
      rightEye.scale.y = 1 - blink * 0.78;
      leftPupil.scale.y = 1 - blink * 0.6;
      rightPupil.scale.y = 1 - blink * 0.6;

      // Lá sen gợn nhẹ.
      pad.rotation.y = Math.sin(t * 0.7) * 0.035;
      padHighlight.rotation.y = pad.rotation.y;

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
