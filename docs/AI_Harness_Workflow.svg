<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1200" fill="#F8F8F8"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">AI Harness Workflow — Updated with Bonus Nodes</text>
  <text x="450" y="54" text-anchor="middle" font-size="11" fill="#666">★ = Bonus node phát hiện từ n8n implementation</text>

  <!-- ── Student Chat ── -->
  <rect x="325" y="72" width="170" height="40" rx="8" fill="#E8E8E8" stroke="#AAAAAA" stroke-width="1"/>
  <text x="410" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Student chat</text>
  <line x1="410" y1="112" x2="410" y2="132" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- AI Harness -->
  <rect x="295" y="132" width="230" height="48" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="410" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#26215C">AI Harness</text>
  <text x="410" y="170" text-anchor="middle" font-size="10" fill="#3C3489">Lớp điều phối trung tâm</text>
  <line x1="410" y1="180" x2="410" y2="200" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ★ Get Student Score Memory -->
  <rect x="295" y="200" width="230" height="44" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="1.2"/>
  <text x="410" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#042C53">★ Get student score memory</text>
  <text x="410" y="234" text-anchor="middle" font-size="10" fill="#0C447C">Session memory độc lập</text>
  <line x1="410" y1="244" x2="410" y2="264" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Intent Classifier -->
  <rect x="305" y="264" width="210" height="40" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1"/>
  <text x="410" y="289" text-anchor="middle" font-size="13" font-weight="bold" fill="#04342C">Intent classifier</text>
  <line x1="410" y1="304" x2="410" y2="324" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Mode diamond -->
  <polygon points="410,324 476,356 410,388 344,356" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="410" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#412402">Mode</text>

  <!-- ── LEFT: CODE branch ── -->
  <line x1="344" y1="356" x2="160" y2="356" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="248" y="346" text-anchor="middle" font-size="9" fill="#444">CODE_AI_MENTOR</text>
  <rect x="72" y="376" width="150" height="40" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
  <text x="147" y="401" text-anchor="middle" font-size="12" font-weight="bold" fill="#042C53">Code mentor</text>
  <line x1="147" y1="416" x2="147" y2="444" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="72" y="444" width="150" height="40" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
  <text x="147" y="469" text-anchor="middle" font-size="12" font-weight="bold" fill="#042C53">Update memory CODE</text>
  <!-- Code → Respond to Student -->
  <path d="M222 464 L264 464 L264 712 L305 712" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── CENTER: RAG branch ── -->
  <line x1="410" y1="388" x2="410" y2="412" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="428" y="402" font-size="9" fill="#444">RAG_TUTOR</text>
  <rect x="318" y="412" width="184" height="40" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1"/>
  <text x="410" y="437" text-anchor="middle" font-size="12" font-weight="bold" fill="#04342C">Course RAG query</text>
  <line x1="410" y1="452" x2="410" y2="474" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ★ In-Confidence Check diamond -->
  <polygon points="410,474 484,506 410,538 336,506" fill="#FAC775" stroke="#BA7517" stroke-width="1.5"/>
  <text x="410" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#412402">★ In-confidence</text>
  <text x="410" y="516" text-anchor="middle" font-size="11" font-weight="bold" fill="#412402">check</text>

  <!-- High confidence → Improve Suggestions → Update Memory RAG -->
  <line x1="484" y1="506" x2="580" y2="506" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="532" y="498" text-anchor="middle" font-size="9" fill="#444">High</text>
  <rect x="580" y="484" width="166" height="44" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1"/>
  <text x="663" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#04342C">Improve suggestions</text>
  <text x="663" y="518" text-anchor="middle" font-size="9" fill="#085041">AI rewrite / enhance</text>
  <line x1="663" y1="528" x2="663" y2="556" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="580" y="556" width="166" height="40" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="1"/>
  <text x="663" y="581" text-anchor="middle" font-size="12" font-weight="bold" fill="#042C53">Update memory RAG</text>
  <!-- Update Memory RAG → Respond to Student -->
  <path d="M580 576 L530 576 L530 712 L515 712" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ★ Low confidence → Create Incubation -->
  <line x1="410" y1="538" x2="410" y2="562" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="428" y="552" font-size="9" fill="#444">Low</text>
  <rect x="312" y="562" width="196" height="44" rx="8" fill="#F5C4B3" stroke="#D85A30" stroke-width="1.5"/>
  <text x="410" y="580" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A1B0C">★ Create incubation</text>
  <text x="410" y="596" text-anchor="middle" font-size="10" fill="#712B13">Chờ bổ sung kiến thức</text>
  <path d="M410 606 L410 712" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── RIGHT: ESCALATE branch ── -->
  <line x1="476" y1="356" x2="660" y2="356" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="572" y="346" text-anchor="middle" font-size="9" fill="#444">ESCALATE</text>
  <rect x="594" y="376" width="148" height="40" rx="8" fill="#F5C4B3" stroke="#D85A30" stroke-width="1"/>
  <text x="668" y="401" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A1B0C">Teacher escalation</text>
  <line x1="668" y1="416" x2="668" y2="444" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="594" y="444" width="148" height="40" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="1"/>
  <text x="668" y="469" text-anchor="middle" font-size="12" font-weight="bold" fill="#26215C">Teacher / mentor</text>
  <!-- Teacher → Respond to Student -->
  <path d="M594 464 L548 464 L548 712 L515 712" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Respond to Student ── -->
  <rect x="305" y="712" width="210" height="40" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="1"/>
  <text x="410" y="737" text-anchor="middle" font-size="13" font-weight="bold" fill="#173404">Respond to student</text>
  <line x1="410" y1="752" x2="410" y2="772" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Student Review -->
  <rect x="318" y="772" width="184" height="40" rx="8" fill="#E8E8E8" stroke="#AAAAAA" stroke-width="1"/>
  <text x="410" y="797" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Student review</text>
  <line x1="410" y1="812" x2="410" y2="832" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Needs Review diamond -->
  <polygon points="410,832 480,864 410,896 340,864" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="410" y="868" text-anchor="middle" font-size="12" font-weight="bold" fill="#412402">Needs review?</text>

  <!-- No → Analytics Only -->
  <line x1="340" y1="864" x2="210" y2="864" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="272" y="856" text-anchor="middle" font-size="9" fill="#444">No</text>
  <rect x="88" y="844" width="124" height="40" rx="8" fill="#E8E8E8" stroke="#AAAAAA" stroke-width="1"/>
  <text x="150" y="869" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Analytics only</text>

  <!-- Yes → ★ Review State Machine -->
  <line x1="410" y1="896" x2="410" y2="920" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="428" y="910" font-size="9" fill="#444">Yes</text>

  <!-- ★ Review State Machine diamond -->
  <polygon points="410,920 484,952 410,984 336,952" fill="#FAC775" stroke="#BA7517" stroke-width="1.5"/>
  <text x="410" y="946" text-anchor="middle" font-size="11" font-weight="bold" fill="#412402">★ Review state</text>
  <text x="410" y="962" text-anchor="middle" font-size="11" font-weight="bold" fill="#412402">machine</text>

  <!-- State: Review Saved -->
  <line x1="336" y1="952" x2="210" y2="952" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="270" y="942" text-anchor="middle" font-size="9" fill="#444">Saved</text>
  <rect x="80" y="932" width="130" height="40" rx="8" fill="#E8E8E8" stroke="#AAAAAA" stroke-width="1"/>
  <text x="145" y="957" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Review saved</text>

  <!-- State: Send to Mentor → Knowledge Candidate -->
  <line x1="410" y1="984" x2="410" y2="1008" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="428" y="998" font-size="9" fill="#444">Mentor</text>
  <rect x="312" y="1008" width="196" height="40" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="1"/>
  <text x="410" y="1033" text-anchor="middle" font-size="12" font-weight="bold" fill="#26215C">Knowledge candidate</text>
  <line x1="410" y1="1048" x2="410" y2="1068" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- State: Send to Senior (direct path) -->
  <path d="M484 952 L660 952 L660 1068" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="578" y="942" text-anchor="middle" font-size="9" fill="#444">Senior</text>

  <!-- Senior Mentor Approval diamond -->
  <polygon points="410,1068 490,1100 410,1132 330,1100" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="410" y="1104" text-anchor="middle" font-size="11" font-weight="bold" fill="#412402">Senior mentor approval</text>

  <!-- Reject → Do Not Learn -->
  <line x1="330" y1="1100" x2="210" y2="1100" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="268" y="1090" text-anchor="middle" font-size="9" fill="#444">Reject</text>
  <rect x="80" y="1080" width="130" height="40" rx="8" fill="#F7C1C1" stroke="#E24B4A" stroke-width="1"/>
  <text x="145" y="1105" text-anchor="middle" font-size="12" font-weight="bold" fill="#501313">Do not learn</text>

  <!-- Approve → Elasticsearch RAG Brain -->
  <line x1="490" y1="1100" x2="600" y2="1100" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="548" y="1090" text-anchor="middle" font-size="9" fill="#444">Approve</text>
  <rect x="600" y="1080" width="192" height="40" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="1"/>
  <text x="696" y="1105" text-anchor="middle" font-size="12" font-weight="bold" fill="#173404">Elasticsearch RAG brain</text>

  <!-- Elasticsearch → RAG Tutor feedback loop -->
  <path d="M792 1080 L840 1080 L840 430 L502 430" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="6 4" marker-end="url(#arrow-dash)"/>
  <text x="852" y="760" text-anchor="middle" font-size="9" fill="#666" transform="rotate(-90 852 760)">Knowledge feed back vào RAG tutor</text>

  <!-- Legend box -->
  <rect x="60" y="608" width="220" height="72" rx="8" fill="white" stroke="#DDD" stroke-width="1"/>
  <text x="76" y="628" font-size="11" font-weight="bold" fill="#333">Chú thích</text>
  <rect x="76" y="638" width="12" height="12" rx="2" fill="#F5C4B3" stroke="#D85A30"/>
  <text x="96" y="649" font-size="10" fill="#333">★ Bonus node (từ n8n)</text>
  <line x1="76" y1="663" x2="100" y2="663" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="108" y="667" font-size="10" fill="#333">Feedback loop</text>
  <rect x="76" y="675" width="12" height="12" rx="2" fill="#FAC775" stroke="#BA7517"/>
  <text x="96" y="686" font-size="10" fill="#333">Decision / Switch</text>

</svg>
